<div class="planner-dialog-backdrop" (click)="cancelDialog()">
  <section
    class="planner-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="cast-spell-dialog-title"
    (click)="$event.stopPropagation()"
  >
    <div class="planner-dialog-header">
      <div>
        <h2 id="cast-spell-dialog-title">Configure Cast Spell</h2>
        <p>Choose a spell to cast on tick T{{ actionTick() }} without changing the baseline active spell.</p>
      </div>
    </div>

    <label class="control-field dialog-field">
      <span>Spell</span>
      <select
        [ngModel]="selectedSpellId()"
        (ngModelChange)="updateSelectedSpellId($event)"
      >
        @for (option of options(); track option.spellId) {
          <option [ngValue]="option.spellId" [title]="option.optionLabel">
            {{ option.optionLabel }}
          </option>
        }
      </select>
    </label>

    <div class="planner-dialog-actions">
      <button type="button" class="dialog-danger" (click)="removeAction()">Remove</button>
      <button type="button" class="dialog-secondary" (click)="cancelDialog()">Cancel</button>
      <button type="button" class="dialog-primary" (click)="applySelection()">Apply</button>
    </div>
  </section>
</div>
